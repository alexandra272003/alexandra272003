name: Generate Snake
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: alexandra272003
          outputs: |
            dist/snake-contribution-graph.svg
            dist/snake-contribution-graph-dark.svg?palette=github-dark
      - name: Push snake animation
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
